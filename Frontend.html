<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload - NatureScapes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <h1>NatureScapes</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="upload.html">Upload</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
  </nav>

  <section class="featured">
    <h2>Upload Media</h2>

    <form id="uploadForm">
      <input type="text" id="title" placeholder="Title" required /><br /><br />
      <input type="text" id="category" placeholder="Category" required /><br /><br />
      <textarea id="description" placeholder="Description"></textarea><br /><br />
      <input type="file" id="file" accept="image/*,video/*" required /><br /><br />

      <img id="preview" style="max-width:300px; display:none; border-radius:8px; margin-bottom:15px;" />
      <video id="videoPreview" controls style="max-width:300px; display:none; border-radius:8px; margin-bottom:15px;"></video>
      <br />

      <button type="submit">Upload</button>
    </form>
  </section>

  <script>
    const fileInput = document.getElementById("file");
    const imagePreview = document.getElementById("preview");
    const videoPreview = document.getElementById("videoPreview");

    fileInput.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const fileURL = URL.createObjectURL(file);

      imagePreview.style.display = "none";
      videoPreview.style.display = "none";
      imagePreview.src = "";
      videoPreview.src = "";

      if (file.type.startsWith("image/")) {
        imagePreview.src = fileURL;
        imagePreview.style.display = "block";
      } else if (file.type.startsWith("video/")) {
        videoPreview.src = fileURL;
        videoPreview.style.display = "block";
      }
    });

    document.getElementById("uploadForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const file = fileInput.files[0];
      if (!file) {
        alert("Please choose a file");
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        const newItem = {
          id: Date.now().toString(),
          title: document.getElementById("title").value,
          category: document.getElementById("category").value,
          description: document.getElementById("description").value,
          fileType: file.type,
          fileUrl: reader.result
        };

        const existing = JSON.parse(localStorage.getItem("mediaItems")) || [];
        existing.push(newItem);
        localStorage.setItem("mediaItems", JSON.stringify(existing));

        alert("Upload successful");
        window.location.href = "gallery.html";
      };

      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
